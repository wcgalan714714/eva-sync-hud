<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NERV PILOT VITALS • EVA HUD</title>
<style>
  :root {
    --orange: #FF6B00;
    --red: #FF2D00;
    --green: #00FF9F;
    --bg: #0A0A0A;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: #FF9500;
    font-family: 'Courier New', Consolas, monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .hud {
    width: 580px;
    height: 580px;
    background: #111;
    border: 4px solid var(--orange);
    box-shadow: 0 0 25px var(--orange), inset 0 0 50px rgba(255,107,0,0.1);
    position: relative;
    overflow: hidden;
    padding: 25px;
    box-sizing: border-box;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 4px, rgba(255,107,0,0.07) 4px, rgba(255,107,0,0.07) 7px);
    pointer-events: none;
    z-index: 20;
    animation: scan 4s linear infinite;
  }

  @keyframes scan {
    0% { background-position: 0 0; }
    100% { background-position: 0 300px; }
  }

  .header {
    text-align: center;
    font-size: 20px;
    letter-spacing: 8px;
    margin-bottom: 15px;
    text-shadow: 0 0 15px var(--orange);
  }

  .gauge-container {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto 20px;
  }

  .gauge {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: conic-gradient(var(--orange) 0deg 280deg, #222 280deg 360deg);
    box-shadow: 0 0 35px var(--orange), inset 0 0 70px rgba(0,0,0,0.8);
    border: 10px solid #222;
    position: relative;
    transition: background 0.8s ease-out;
  }

  .gauge::after {
    content: '';
    position: absolute;
    inset: 22px;
    background: #0A0A0A;
    border-radius: 50%;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
  }

  .gauge-value {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 72px;
    font-weight: 900;
    z-index: 2;
    text-shadow: 0 0 25px var(--orange);
    transition: color 0.4s ease, transform 0.2s ease;
  }

  .gauge-label {
    position: absolute;
    bottom: 42px; left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 4px;
    z-index: 2;
    opacity: 0.85;
  }

  .vitals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 18px;
  }

  .vital {
    background: rgba(255,107,0,0.06);
    border: 2px solid var(--orange);
    padding: 10px 6px;
    text-align: center;
    transition: all 0.3s ease;
  }

  .vital-value {
    font-size: 26px;
    font-weight: bold;
    line-height: 1;
    transition: color 0.3s ease, transform 0.15s ease;
  }

  .status {
    text-align: center;
    font-size: 14px;
    padding: 10px;
    border: 2px solid var(--orange);
    letter-spacing: 2px;
    background: rgba(0,0,0,0.5);
    transition: all 0.5s ease;
  }

  .status.good { border-color: var(--green); color: var(--green); }
  .status.warning { border-color: var(--red); color: var(--red); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 25px var(--orange); }
    50% { box-shadow: 0 0 40px var(--green); }
  }

  .good-pulse {
    animation: pulse 2s infinite ease-in-out;
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }

  .glitch { animation: glitch 0.3s linear; }
</style>
</head>
<body>

<div class="hud">
  <div class="scanlines"></div>

  <div class="header">NERV • PILOT VITALS</div>

  <div class="gauge-container">
    <div class="gauge" id="gauge">
      <div class="gauge-value" id="sync">87</div>
      <div class="gauge-label">SYNC %</div>
    </div>
  </div>

  <div class="vitals">
    <div class="vital" id="vital-protein">
      <div class="vital-label">LCL CONC.</div>
      <div class="vital-value" id="protein">142<span style="font-size:13px">g</span></div>
    </div>
    <div class="vital" id="vital-activity">
      <div class="vital-label">POWER OUT</div>
      <div class="vital-value" id="activity">8.4k</div>
    </div>
    <div class="vital" id="vital-water">
      <div class="vital-label">HYDRATION</div>
      <div class="vital-value" id="water">2.1<span style="font-size:13px">L</span></div>
    </div>
  </div>

  <div class="status" id="status">AT FIELD STABLE • FIELD OPS MODE</div>
</div>

<script>
function updateVitals(newSync, newProtein, newActivity, newWater) {
  const syncEl = document.getElementById('sync');
  const gauge = document.getElementById('gauge');
  const statusEl = document.getElementById('status');

  syncEl.textContent = newSync;
  const angle = newSync * 3.6;

  if (newSync >= 90) {
    gauge.style.background = `conic-gradient(var(--green) 0deg ${angle}deg, #222 ${angle}deg 360deg)`;
    statusEl.className = 'status good';
    statusEl.textContent = 'AT FIELD MAXIMUM • EXCELLENT SYNC';
    gauge.classList.add('good-pulse');
  } else if (newSync < 60) {
    gauge.style.background = `conic-gradient(var(--red) 0deg ${angle}deg, #222 ${angle}deg 360deg)`;
    statusEl.className = 'status warning';
    statusEl.textContent = 'WARNING: SYNC LOW • RECALIBRATE';
    gauge.classList.add('glitch');
    setTimeout(() => gauge.classList.remove('glitch'), 400);
  } else {
    gauge.style.background = `conic-gradient(var(--orange) 0deg ${angle}deg, #222 ${angle}deg 360deg)`;
    statusEl.className = 'status';
    statusEl.textContent = 'AT FIELD STABLE • FIELD OPS MODE';
    gauge.classList.remove('good-pulse');
  }

  if (newProtein !== undefined) {
    const p = document.getElementById('protein');
    p.textContent = newProtein + (newProtein > 100 ? '' : '<span style="font-size:13px">g</span>');
    document.getElementById('vital-protein').classList.add('glitch');
    setTimeout(() => document.getElementById('vital-protein').classList.remove('glitch'), 300);
  }
}

document.getElementById('gauge').addEventListener('click', () => {
  const current = parseInt(document.getElementById('sync').textContent);
  const next = current >= 95 ? 52 : current + 12;
  updateVitals(next, 152, 9200, 2.3);
});

updateVitals(87, 142, 8400, 2.1);
</script>
</body>
</html>
